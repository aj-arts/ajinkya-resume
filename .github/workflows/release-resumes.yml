name: Build and Release Resumes

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDFs
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ajinkya-gokule-*-resume.tex
          glob_root_file: true

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Resume (latest)
          body: |
            Auto-updated from `${{ github.sha }}` on branch `${{ github.ref_name }}`.
          files: ajinkya-gokule-*-resume.pdf
          make_latest: true
          overwrite_files: true
