name: Build and Release Resumes

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover-variants:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover and validate resume variants
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          invalid=0

          for tex in *.tex; do
            if [[ "$tex" =~ ^ajinkya-gokule-[a-z0-9]+(-[a-z0-9]+)*-resume\.tex$ ]]; then
              continue
            fi
            if [[ "$tex" =~ ^include-.*\.tex$ ]] || [[ "$tex" =~ ^partial-.*\.tex$ ]]; then
              continue
            fi
            echo "::error file=$tex::Root-level .tex files must be ajinkya-gokule-[role]-resume.tex or helper files prefixed with include-/partial-."
            invalid=1
          done

          if [[ "$invalid" -ne 0 ]]; then
            exit 1
          fi

          entries=()
          for tex in ajinkya-gokule-*-resume.tex; do
            if [[ "$tex" =~ ^ajinkya-gokule-([a-z0-9]+(-[a-z0-9]+)*)-resume\.tex$ ]]; then
              role="${BASH_REMATCH[1]}"
              pdf="${tex%.tex}.pdf"
              tag="latest-${role}"
              release_name="Resume ${role} (latest)"
              entries+=("{\"tex\":\"$tex\",\"role\":\"$role\",\"pdf\":\"$pdf\",\"tag\":\"$tag\",\"release_name\":\"$release_name\"}")
            fi
          done

          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "::error::No resume variants found. Add at least one file matching ajinkya-gokule-[role]-resume.tex."
            exit 1
          fi

          matrix="[$(IFS=,; echo "${entries[*]}")]"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build and release (${{ matrix.role }})
    runs-on: ubuntu-latest
    needs: discover-variants
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-variants.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ matrix.tex }}

      - name: Ensure PDF exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ matrix.pdf }}"

      - name: Publish rolling release for role
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: ${{ matrix.release_name }}
          body: |
            Auto-updated from `${{ github.sha }}` on branch `${{ github.ref_name }}`.
          files: |
            ${{ matrix.pdf }}
          make_latest: false
          overwrite_files: true
